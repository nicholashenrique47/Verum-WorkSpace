<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Verum</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            text-align: center;
        }

        .login-box h2 {
            font-family: var(--fonte-titulos);
            color: var(--cor-destaque);
            margin-bottom: 10px;
        }

        .login-box p {
            color: #ccc;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        .input-senha {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 2px;
            outline: none;
        }

        .input-senha:focus {
            border-color: var(--cor-destaque);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
        }

        #mensagem-erro {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="split-screen">
        <!-- Coluna Esquerda: Formulário -->
        <div class="split-left">
            <div class="login-box">
                <h2 style="font-size: 2.2rem;">Verum Workspace</h2>
                <p>Acesse o painel restrito para gerenciar seu escritório.</p>

                <form id="form-login" style="margin-top: 30px;">
                    <input type="password" id="senha" class="input-senha" placeholder="Insira sua chave de acesso"
                        required>
                    <button type="submit" class="btn-primario btn-login">Acessar Sistema</button>

                    <div style="margin-top: 25px; display: flex; justify-content: space-between; font-size: 0.9rem;">
                        <label style="color: #ccc; cursor: pointer; display: flex; align-items: center; gap: 8px;">
                            <input type="checkbox"> Lembrar-me
                        </label>
                        <a href="#" style="color: var(--cor-destaque); text-decoration: none; transition: opacity 0.2s;"
                            onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">Precisa de
                            ajuda?</a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Coluna Direita: Branding/Imagem -->
        <div class="split-right">
            <div class="split-right-content">
                <h2>Entrar no Verum</h2>
                <p>O Verum Workspace automatiza a emissão de peças, organiza sua carteira de clientes e eleva a gestão
                    do seu escritório ao nível Enterprise.</p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('form-login').addEventListener('submit', async function (e) {
            e.preventDefault();

            const senha = document.getElementById('senha').value;
            const btn = document.querySelector('.btn-login');

            btn.innerText = "Verificando...";

            try {
                // Simula token da Verum
                const resposta = await fetch('https://vogaapi.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senha: senha })
                });

                if (resposta.ok) {
                    const dados = await resposta.json();

                    // Salva o "Selo de Acesso" no navegador e esconde a chave
                    sessionStorage.setItem('verum_token', 'token_seguro_123');
                    sessionStorage.setItem('verum_tenantId', dados.tenantId);

                    Swal.fire({
                        title: 'Acesso Liberado!',
                        text: 'Redirecionando para o painel...',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false,
                        background: 'rgba(11, 19, 43, 0.9)',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = 'painel.html';
                    });
                } else {
                    // Errou a senha
                    Swal.fire({
                        title: 'Acesso Negado',
                        text: 'A senha informada está incorreta.',
                        icon: 'error',
                        background: 'rgba(11, 19, 43, 0.9)',
                        color: '#fff',
                        confirmButtonColor: '#D4AF37'
                    });
                    btn.innerText = "Acessar Sistema";
                }
            } catch (error) {
                Swal.fire({
                    title: 'Erro de Conexão',
                    text: 'Não foi possível conectar ao servidor. Tente novamente mais tarde.',
                    icon: 'warning',
                    background: 'rgba(11, 19, 43, 0.9)',
                    color: '#fff',
                    confirmButtonColor: '#D4AF37'
                });
                btn.innerText = "Acessar Sistema";
            }
        });
    </script>
</body>

</html>
